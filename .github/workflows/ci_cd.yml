name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: 3.9
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Run Data Pipeline
      run: |
        # Run data pipeline to train model and generate artifacts
        PYTHONPATH=. python src/models/trainer_pipeline.py
        
    - name: Run Tests
      run: |
        # Run the integration tests
        PYTHONPATH=. python test_mlflow_integration.py
        
        # Start the FastAPI app in the background
        PYTHONPATH=. python -m uvicorn app:app --port 5000 &
        
        # Wait for the app to start
        sleep 5
        
        # Run API integration tests
        PYTHONPATH=. python test_api.py
        
  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v2
      
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
        
    - name: Login to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
    
    - name: Build and push Docker image
      run: |
        docker build . --file Dockerfile --tag ${{ secrets.REGISTRY_LOGIN_SERVER }}/churn-prediction-app:latest
        docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/churn-prediction-app:latest
        
    - name: Terraform Init
      run: terraform init
      working-directory: terraform
      
    - name: Terraform Apply
      run: terraform apply -auto-approve
      working-directory: terraform
