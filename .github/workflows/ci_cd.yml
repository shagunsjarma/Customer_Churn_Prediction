name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: 3.9
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Run Data Pipeline
      run: |
        # Run data pipeline to train model and generate artifacts
        PYTHONPATH=. python src/models/trainer_pipeline.py
        
    - name: Run Tests
      run: |
        # Run the integration tests
        PYTHONPATH=. python test_mlflow_integration.py
        
        # Start the Flask app in the background
        PYTHONPATH=. python app.py &
        
        # Wait for the app to start
        sleep 5
        
        # Run API integration tests
        PYTHONPATH=. python test_api.py
        
  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker image
      run: |
        docker build . --file Dockerfile --tag churn-prediction-app:latest
